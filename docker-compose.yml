services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ts-template-app
    env_file: .env
    ports:
      - '${APP_PORT:-3000}:3000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Uncomment when db service is enabled:
    # depends_on:
